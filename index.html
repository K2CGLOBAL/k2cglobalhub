<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K2C Global Hub</title>

<style>
body {
  font-family: 'Arial', sans-serif;
  background:#f0f2f5;
  margin:0;
  padding:0;
}
header {
  background:#28a745;
  color:white;
  padding:20px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}
h2 {margin-bottom:10px; color:#333;}
main {max-width:1200px; margin:auto; padding:20px;}
.products {display:flex; flex-wrap:wrap; gap:20px; justify-content:center;}
.product {
  background:#fff;
  padding:15px;
  border-radius:15px;
  width:200px;
  text-align:center;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}
.product:hover {transform: translateY(-5px);}
.product img {width:100%; height:150px; object-fit:cover; border-radius:10px; margin-bottom:10px;}
button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#28a745;
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition: background 0.2s;
}
button:hover {background:#218838;}
input {
  border:1px solid #ccc;
  border-radius:8px;
  padding:10px;
  width:100%;
  margin-bottom:10px;
  font-size:14px;
}
#cart {background:#fff; padding:20px; margin-top:20px; border-radius:15px; box-shadow:0 4px 8px rgba(0,0,0,0.1);}
#cart h3 {margin-top:10px; margin-bottom:10px; color:#555;}
#cart-items div {margin-bottom:8px; font-weight:500;}
footer {text-align:center; padding:20px; background:#333; color:white;}
@media (max-width:600px) {
  .products {flex-direction:column; align-items:center;}
  .product {width:90%;}
}
</style>
</head>
<body>

<header>K2C Global Hub - Shop Quality Items</header>

<main>

<!-- Products Section -->
<section id="products" class="products"></section>

<!-- Customer Form -->
<div style="background:#fff; padding:15px; margin:20px; border-radius:10px;">
  <h2>Customer Details</h2>
  <input id="cust-name" type="text" placeholder="Enter your full name" />
  <input id="cust-phone" type="text" placeholder="Enter your phone number" />
</div>

<!-- Cart Section -->
<section id="cart">
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
  <h3>Total: ₦<span id="total">0</span></h3>
  <button id="checkout">Checkout</button>
</section>

</main>

<footer>© 2026 K2C Global Hub | Contact: 08134153644</footer>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>emailjs.init("YOUR_USER_ID_HERE");</script>
<script src="script.js"></script>

</body>
</html>
